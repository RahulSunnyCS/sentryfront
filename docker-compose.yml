version: '3.8'

services:
  # Main Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibesafe-app
    ports:
      - "3000:3000"
    environment:
      # Database (use postgres service below)
      DATABASE_URL: postgresql://vibesafe:vibesafe_password@postgres:5432/vibesafe
      
      # NextAuth
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      
      # OAuth (optional)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      
      # LLM Enrichment (optional)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_ENRICHMENT_ENABLED: ${LLM_ENRICHMENT_ENABLED:-true}
      
      # Features
      PDF_EXPORT_ENABLED: ${PDF_EXPORT_ENABLED:-true}
      FEATURE_SCAN_DIFF_ENABLED: ${FEATURE_SCAN_DIFF_ENABLED:-true}
      TIER_GATING_ENABLED: ${TIER_GATING_ENABLED:-false}
      
      # Monitoring (optional)
      SENTRY_DSN: ${SENTRY_DSN:-}
      
      # Redis (for queue)
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vibesafe-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vibesafe-postgres
    environment:
      POSTGRES_USER: vibesafe
      POSTGRES_PASSWORD: vibesafe_password
      POSTGRES_DB: vibesafe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibesafe"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vibesafe-network

  # Redis (for BullMQ queue)
  redis:
    image: redis:7-alpine
    container_name: vibesafe-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vibesafe-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  vibesafe-network:
    driver: bridge
