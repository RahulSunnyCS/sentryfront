  </text>

  <text x="600" y="500" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="500" fill="#94A3B8" text-anchor="middle" letter-spacing="-0.01em">
