    <ellipse cx="150" cy="160" rx="80" ry="70" fill="#000"/>
    <circle cx="115" cy="155" r="28" fill="url(#glow)"/>
    <circle cx="115" cy="155" r="11" fill="#7DF9FF"/>
    <circle cx="185" cy="155" r="28" fill="url(#glow)"/>
    <circle cx="185" cy="155" r="11" fill="#7DF9FF"/>
  </g>

  <text x="600" y="440" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="76" font-weight="800" fill="#F8FAFC" text-anchor="middle" letter-spacing="-0.02em">
