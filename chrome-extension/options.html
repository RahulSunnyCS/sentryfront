<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeSafe — Settings</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background: #0f1117; color: #e8eaf0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
</head>
<body>
  <div class="options-wrap">
    <h1 class="options-title">&#9705; VibeSafe Settings</h1>

    <div class="field">
      <label for="api-base">API Base URL</label>
      <input
        type="url"
        id="api-base"
        placeholder="https://vibesafe.io"
        spellcheck="false"
      />
    </div>

    <button id="btn-save" class="btn btn-primary">Save</button>
    <p id="saved-msg" class="saved-msg hidden">Settings saved.</p>

    <hr style="border-color: #2a2d3a;" />

    <div>
      <p style="font-size:12px; color:#7a7f9a; margin-bottom:8px;">Logged-in session is shared with your browser. To log out, sign out from the VibeSafe web app.</p>
      <button id="btn-open-app" class="btn btn-secondary">Open VibeSafe &rarr;</button>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
