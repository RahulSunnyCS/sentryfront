name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# SEC-L1: Least-privilege default. Every job inherits contents:read unless it
# explicitly overrides. actions/upload-artifact uses the Actions runtime token,
# not the GITHUB_TOKEN contents scope, so artifact upload is unaffected.
permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run scan-quality corpus (Phase 3.6 replay)
        run: npm run test:corpus

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    env:
      CI: 'true'
      DEV_DATABASE_URL: 'file:./e2e.db'
      NEXTAUTH_SECRET: 'e2e-dummy-secret-not-for-production'
      NEXTAUTH_URL: 'http://localhost:3000'
      AUTH_PROVIDER: 'nextauth'
      RATE_LIMIT_PER_HOUR: '100000'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # AR-L3: Include the pinned Playwright version in the cache key so
          # that a version bump always evicts the stale ~300 MB browser cache.
          # Without the version prefix, an unrelated dep change in
          # package-lock.json would also cause a spurious cache miss.
          key: ${{ runner.os }}-playwright-1.59.1-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-1.59.1-
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
